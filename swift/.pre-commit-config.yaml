repos:
  - repo: https://github.com/nicklockwood/SwiftFormat
    rev: 0.60.1
    hooks:
      - id: swiftformat
        args: [--config, .swiftformat]

  - repo: https://github.com/realm/SwiftLint
    rev: 0.63.2
    hooks:
      - id: swiftlint
        args: [--strict, --config, .swiftlint.yml]

  - repo: local
    hooks:
      - id: jscpd
        name: jscpd
        entry: npx jscpd . --config .jscpd.json
        language: system
        files: \.swift$
        pass_filenames: false
