name: Docker Build on GHCR

on:
    workflow_call:
        inputs:
            image_name:
                required: true
                type: string
            dockerfile_path:
                required: false
                type: string
                default: ./Dockerfile
            context:
                required: false
                type: string
                default: .
            build_args:
                required: false
                type: string
            target:
                required: false
                type: string
            tags:
                required: false
                type: string
                default: ""
            platforms:
                required: false
                type: string
                default: linux/amd64,linux/arm64

        secrets:
            registry_token:
                required: false

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            packages: write
        steps:
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Resolve build context
              id: build-context
              shell: bash
              env:
                  INPUT_CONTEXT: ${{ inputs.context }}
              run: |
                  context="${INPUT_CONTEXT:-.}"
                  context="${context#./}"
                  context="${context#/}"

                  if [ -z "$context" ] || [ "$context" = "." ]; then
                      echo 'value={{defaultContext}}' >> "$GITHUB_OUTPUT"
                  else
                      echo "value={{defaultContext}}:$context" >> "$GITHUB_OUTPUT"
                  fi

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  # Use the passed secret if available, otherwise fallback to GITHUB_TOKEN
                  password: ${{ secrets.registry_token || secrets.GITHUB_TOKEN }}

            - name: Prepare metadata config
              id: meta-config
              uses: actions/github-script@v9
              env:
                  INPUT_TAGS: ${{ inputs.tags }}
              with:
                  script: |
                      const tags = (process.env.INPUT_TAGS || '')
                        .split(/\r?\n/)
                        .map((tag) => tag.trim())
                        .filter(Boolean);

                      const isTag = context.refType === 'tag';
                      const isMain = context.refType === 'branch' && context.refName === 'main';

                      const metadataTags = tags.length > 0
                        ? tags.map((tag) => `type=raw,value=${tag}`)
                        : [
                            'type=sha,format=long,prefix=sha-',
                            `type=raw,value=latest,enable=${isMain || isTag}`,
                            `type=raw,value=${context.refName},enable=${isTag}`,
                          ];

                      core.setOutput('tags', metadataTags.join('\n'));

            - name: Compute tags
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
                  tags: ${{ steps.meta-config.outputs.tags }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                context: ${{ steps.build-context.outputs.value }}
                file: ${{ inputs.dockerfile_path }}
                target: ${{ inputs.target }}
                platforms: ${{ inputs.platforms }}
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                build-args: ${{ inputs.build_args }}
                cache-from: type=gha
                cache-to: type=gha,mode=max
