# Reusable lefthook configuration for Node.js/Bun projects
# Reference this from your project's lefthook.yml:
# remotes:
#   - git_url: https://github.com/victory-sokolov/githooks
#     configs:
#       - hooks/lefthook/lefthook.yml

pre-commit:
  parallel: true
  commands:
    format:
      run: bun run format
      stage_fixed: true
    lint:
      run: bun run lint:fix
      stage_fixed: true
    typecheck:
      run: bun run typecheck
    # ──────────────────────────────────────────────────────
    # auto-update lockfile when package.json is staged
    deps-sync:
      glob: 'package.json'
      run: |
        sfw bun install --frozen-lockfile --ignore-scripts
        git add bun.lock*
