name: Reusable Node.js CI

on:
  workflow_call:
    inputs:
      package-manager:
        description: 'Package manager to use (bun or pnpm)'
        default: 'bun'
        type: string
      upload-coverage:
        description: 'Whether to upload coverage reports'
        default: false
        type: boolean
      skip-build:
        description: 'Whether to skip the build step'
        default: true
        type: boolean
      node-version:
        description: 'Node.js version to use'
        default: '24'
        type: string
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Socket firewall
        uses: socketdev/action@ba6de6cc0565af1f42295590380973573297e31f
        with:
          mode: firewall-free

      - name: 🔤 Spell Check with Typos
        uses: crate-ci/typos@v1.44.0

      - name: 📄 Read .nvmrc if exists
        id: nvm
        run: |
          if [ -f .nvmrc ]; then
            echo "NODE_VERSION=$(cat .nvmrc)" >> "$GITHUB_OUTPUT"
          else
            echo "NODE_VERSION=${{ inputs.node-version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Setup dependencies with cache
        uses: victory-sokolov/githooks/.github/actions/node-deps-cache@main
        with:
          package-manager: ${{ inputs.package-manager }}
          node-version: ${{ steps.nvm.outputs.NODE_VERSION }}

      - name: 📋 Display tool versions
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/githooks/main/.github/scripts/display-tool-versions.ts" -o /tmp/display-tool-versions.ts
          node --experimental-strip-types /tmp/display-tool-versions.ts "${{ inputs.package-manager }}" "v1.44.0"

      - name: Check available scripts
        id: scripts
        run: |
          curl -sfL "https://raw.githubusercontent.com/victory-sokolov/githooks/main/.github/scripts/check-available-scripts.ts" -o /tmp/check-available-scripts.ts
          node --experimental-strip-types /tmp/check-available-scripts.ts

      - name: 🔍 Run lint
        if: steps.scripts.outputs.lint == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm lint
          else
            bun run lint
          fi

      - name: ✅ Check formatting
        if: steps.scripts.outputs.format_check == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm format:check
          else
            bun run format:check
          fi
      - name: 🔐 Run typecheck
        if: steps.scripts.outputs.typecheck == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm typecheck
          else
            bun run typecheck
          fi

      - name: 🔨 Run build
        if: steps.scripts.outputs.build == 'true' && !inputs.skip-build
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm build
          else
            bun run build
          fi

      - uses: reviewdog/action-setup@d8edfce3dd5e1ec6978745e801f9c50b5ef80252 # v1.4.0
        with:
          reviewdog_version: latest

      - name: 🧪 Run tests
        if: steps.scripts.outputs.test == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm test --coverage
          else
            bun run test:coverage
          fi

      - name: 📊 Upload coverage reports
        if: inputs.upload-coverage && (success() || failure())
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ inputs.package-manager }}
          path: |
            coverage/
            *.coverage
            .coverage
          retention-days: 7
          compression-level: 6

      - name: 🔍 Check for duplicate code
        if: steps.scripts.outputs.jscpd == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm jscpd
          else
            bun run jscpd
          fi

      - name: ✅ Run Knip
        if: steps.scripts.outputs.knip == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm knip --cache
          else
            bun knip --cache
          fi

      - name: 🔒 Run security audit
        if: steps.scripts.outputs.audit == 'true'
        run: |
          if [ "${{ inputs.package-manager }}" == "pnpm" ]; then
            pnpm audit --audit-level=moderate
          else
            bun audit --moderate
          fi
